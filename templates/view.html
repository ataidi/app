<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>View Products</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4 text-center">Product List</h2>

<a href="/" class="btn btn-primary mb-3">Add New Product</a>

<table class="table table-bordered table-hover table-striped">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Product Name</th>
<th>Quantity</th>
<th>Action</th>
</tr>
</thead>

<tbody>

{% for item in items %}

<tr>

<td>{{ item.id }}</td>
<td>{{ item.pname }}</td>
<td>{{ item.qty }}</td>

<td>

<a href="/edit/{{ item.id }}" class="btn btn-success btn-sm">
Edit
</a>

<a href="/delete/{{ item.id }}" class="btn btn-danger btn-sm">
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
